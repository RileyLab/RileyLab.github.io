<!doctype html>
<html lang="en" class="page-hood-booking">
<head>
  <meta charset="utf-8" />
  <title>Riley Lab – TC Hood Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- TUI Calendar v1 + deps -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tui-calendar@1.12.14/dist/tui-calendar.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tui-time-picker@2.1.6/dist/tui-time-picker.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tui-date-picker@4.3.0/dist/tui-date-picker.min.css">
  <script src="https://cdn.jsdelivr.net/npm/tui-code-snippet@1.5.2/dist/tui-code-snippet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tui-time-picker@2.1.6/dist/tui-time-picker.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tui-date-picker@4.3.0/dist/tui-date-picker.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tui-calendar@1.12.14/dist/tui-calendar.min.js"></script>
  <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
<div class="wrap">
  <h1 class="page-title">Riley Lab TC Hood Booking</h1>

  <div class="calendar-controls">
    <!-- BIG room tabs -->
    <div class="room-nav">
      <a class="btn portal-btn" href="https://rileylab.github.io/">Go back to Portal</a>
      <div class="tabs" id="roomTabs" role="tablist" aria-label="TC room">
        <div class="tab active" data-room="TC1" role="tab" tabindex="0" aria-selected="true"><span class="dot"></span>TC1</div>
        <div class="tab" data-room="TC2" role="tab" tabindex="0" aria-selected="false"><span class="dot"></span>TC2</div>
        <div class="tab" data-room="TC3" role="tab" tabindex="0" aria-selected="false"><span class="dot"></span>TC3</div>
      </div>
    </div>

    <div class="toolbar-actions">
      <div class="title" id="range"></div>
      <button class="btn" id="prev">‹</button>
      <button class="btn" id="today">Today</button>
      <button class="btn" id="next">›</button>
      <button class="btn view-week" id="week">Week</button>
      <button class="btn view-day" id="day">Day</button>
      <button class="btn primary" id="newBooking">+ New booking</button>
    </div>
  </div>

  <div class="slot-finder collapsed" id="slotFinder">
    <button class="slot-finder-toggle" id="slotFinderToggle" type="button" aria-expanded="false" aria-controls="slotFinderPanel">
      <span>Quick Find Availability!</span>
      <span class="slot-finder-icon">⌄</span>
    </button>
    <div class="slot-finder-panel" id="slotFinderPanel">
      <div class="slot-finder-fields">
      <div class="field compact">
        <label for="slotDate">Date</label>
        <input id="slotDate" type="date">
      </div>
      <div class="field compact">
        <label for="slotDuration">Duration</label>
        <select id="slotDuration">
          <option value="30">30 min</option>
          <option value="60" selected>1 hour</option>
          <option value="90">1.5 hours</option>
          <option value="120">2 hours</option>
          <option value="180">3 hours</option>
        </select>
      </div>
      <button class="btn muted" id="refreshSlots">Find slots</button>
      </div>
      <div class="slot-results" id="slotResults"></div>
    </div>
  </div>

  <div id="calendar"></div>
  <div class="load-error hidden" id="loadError">
    <span>Could not load bookings.</span>
    <button class="btn muted" id="retryLoad">Retry</button>
  </div>
  <div class="legend">
    <span>Drag to select a time range to create. Drag/resize an event to edit. Click an event to edit or delete.</span>
    <span class="refresh-status" id="refreshStatus">Live refresh every 30s</span>
  </div>
</div>

<!-- Spinner & Toast -->
<div id="spinner">Saving…</div>
<div id="toast"></div>
<div id="calendarPrompt" class="calendar-prompt hidden">
  <div>
    <strong>Booking saved.</strong>
    <span>Add it to your calendar?</span>
  </div>
  <div class="calendar-prompt-actions">
    <button class="btn primary" id="googleCalendarBtn">Google Calendar</button>
    <button class="btn muted" id="icsCalendarBtn">Download .ics</button>
    <button class="btn muted" id="dismissCalendarPrompt">Dismiss</button>
  </div>
</div>
<div id="bookingTooltip" class="booking-tooltip hidden"></div>

<!-- Modal (Create/Edit) -->
<div class="modal-backdrop" id="modalBg" role="dialog" aria-modal="true">
  <div class="modal" id="modalCard">
    <h3 id="modalTitle">New Booking</h3>

    <div class="grid">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Your name">
      </div>
      <div class="field">
        <label for="date">Date</label>
        <input id="date" type="date">
      </div>
      <div class="field">
        <label for="start">Start time</label>
        <input id="start" type="time" step="900">
      </div>
      <div class="field">
        <label for="end">End time</label>
        <input id="end" type="time" step="900">
      </div>
    </div>

    <!-- Room + Hood selectors -->
    <div class="row spaced">
      <div class="field">
        <label for="room">Room</label>
        <select id="room">
          <option value="TC1">TC1</option>
          <option value="TC2">TC2</option>
          <option value="TC3">TC3</option>
        </select>
      </div>
      <div class="field">
        <label for="hood">Hood</label>
        <select id="hood">
          <option value="1">Hood 1</option>
          <option value="2">Hood 2</option>
          <option value="3">Hood 3</option>
        </select>
      </div>
    </div>

    <div class="booking-options" id="createOptions">
      <div class="field compact">
        <label for="repeatWeeks">Repeat weekly</label>
        <select id="repeatWeeks">
          <option value="1">Does not repeat</option>
          <option value="2">2 weeks</option>
          <option value="4">4 weeks</option>
          <option value="8">8 weeks</option>
          <option value="12">12 weeks</option>
        </select>
      </div>
    </div>

    <div class="availability-box" id="availabilityBox"></div>
    <div class="suggestions" id="suggestions"></div>

    <div class="modal-actions">
      <button class="btn muted" id="cancelBtn">Cancel</button>
      <button class="btn muted hidden" id="extendBtn">+30 min</button>
      <button class="btn muted hidden" id="exportBtn">Google Calendar</button>
      <button class="btn danger hidden" id="deleteBtn">Delete</button>
      <button class="btn primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
  /********* UPDATE THIS LINE WITH YOUR CURRENT /exec URL *********/
  const ENDPOINT = 'https://script.google.com/macros/s/AKfycbwzkzB0tuX-1jtCrF0byVzWGhKkH_4Sko6RYImOQ48LSnZwuy7SCVgkC01_t_Ja2otS/exec';
  /****************************************************************/

  // Calendar definitions (colors)
  const calDefs = [
    ['TC1','1','var(--TC1)'], ['TC1','2','var(--TC1b)'], ['TC1','3','var(--TC1c)'],
    ['TC2','1','var(--TC2)'], ['TC2','2','var(--TC2b)'], ['TC2','3','var(--TC2c)'],
    ['TC3','1','var(--TC3)'], ['TC3','2','var(--TC3b)'], ['TC3','3','var(--TC3c)'],
  ].map(([room,hood,color]) => ({
    id: `${room}-${hood}`,
    name: `${room}/Hood ${hood}`,
    color: '#fff',
    bgColor: getComputedStyle(document.documentElement).getPropertyValue(color).trim()
  }));

  const calendar = new tui.Calendar(document.getElementById('calendar'), {
    defaultView: 'week',
    taskView: false,
    scheduleView: ['time'],
    useCreationPopup: false,
    useDetailPopup: false,
    isReadOnly: false,
    week: { hourStart: 2, hourEnd: 24, workweek: false, narrowWeekend: true, startDayOfWeek: 1 },
    calendars: calDefs,
    template: {
      timegridDisplayPrimaryTime: formatTuiPrimaryTime,
      timegridDisplayPrimayTime: formatTuiPrimaryTime,
      timegridDisplayTime: formatTuiGridTime,
      time: function(schedule) {
        const rawTitle = schedule.title || '';
        const rawName = rawTitle.split(' — ')[0] || rawTitle;
        const name = escapeHtml(rawName);
        const label = escapeHtml((schedule.calendarId || '').replace('-', '/Hood '));
        const room  = (schedule.calendarId || '').split('-')[0] || 'TC1';
        const start = schedule.start?.toDate ? schedule.start.toDate() : new Date(schedule.start);
        const end = schedule.end?.toDate ? schedule.end.toDate() : new Date(schedule.end);
        const timeLabel = escapeHtml(formatTimeRange(start, end));
        const fullLabel = escapeHtml(`${rawName} · ${formatTimeRange(start, end)} · ${(schedule.calendarId || '').replace('-', '/Hood ')}`);
        const isPast = end < new Date();

        // room color from CSS vars
        const roomColor = getComputedStyle(document.documentElement)
          .getPropertyValue(`--${room}`).trim() || '#2563eb';

        return `
          <div class="booking-event${isPast ? ' is-past' : ''}" data-tooltip="${fullLabel}" style="--booking-color:${roomColor}">
            <div class="booking-rail"></div>
            <div class="booking-body">
              <div class="booking-name">${name}</div>
              <div class="booking-time">${timeLabel}</div>
              <div class="booking-room">${label}</div>
            </div>
          </div>
        `;
      }
    }
  });

  /* ---------- Helper handles ---------- */
  const Cal = {
    add(arr){ return calendar.createSchedules(arr); },
    update(id, calId, changes){ return calendar.updateSchedule(id, calId, changes); },
    remove(id, calId){ return calendar.deleteSchedule(id, calId); },
    clear(){ return calendar.clear(); },
    visible(calId, vis){ return calendar.setCalendarVisibility(calId, vis); },
    all(){ return calendar.getSchedules ? calendar.getSchedules() : []; }
  };

  function setRangeTitle(){
    const s = calendar.getDateRangeStart().toDate();
    const e = calendar.getDateRangeEnd().toDate();
    document.getElementById('range').textContent =
      `${s.toLocaleDateString(undefined,{month:'short',day:'numeric'})} – ${e.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}`;
  }

  // UI refs
  const modalBg   = document.getElementById('modalBg');
  const modalTitle= document.getElementById('modalTitle');
  const nameEl    = document.getElementById('name');
  const dateEl    = document.getElementById('date');
  const startEl   = document.getElementById('start');
  const endEl     = document.getElementById('end');
  const roomEl    = document.getElementById('room');
  const hoodEl    = document.getElementById('hood');
  const saveBtn   = document.getElementById('saveBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const deleteBtn = document.getElementById('deleteBtn');
  const extendBtn = document.getElementById('extendBtn');
  const exportBtn = document.getElementById('exportBtn');
  const createOptions = document.getElementById('createOptions');
  const repeatWeeksEl = document.getElementById('repeatWeeks');
  const availabilityBox = document.getElementById('availabilityBox');
  const suggestionsEl = document.getElementById('suggestions');
  const slotDateEl = document.getElementById('slotDate');
  const slotDurationEl = document.getElementById('slotDuration');
  const refreshSlotsBtn = document.getElementById('refreshSlots');
  const slotResults = document.getElementById('slotResults');
  const slotFinder = document.getElementById('slotFinder');
  const slotFinderToggle = document.getElementById('slotFinderToggle');
  const calendarPrompt = document.getElementById('calendarPrompt');
  const googleCalendarBtn = document.getElementById('googleCalendarBtn');
  const icsCalendarBtn = document.getElementById('icsCalendarBtn');
  const dismissCalendarPrompt = document.getElementById('dismissCalendarPrompt');
  const spinner   = document.getElementById('spinner');
  const newBtn    = document.getElementById('newBooking');
  const toastEl   = document.getElementById('toast');
  const loadError = document.getElementById('loadError');
  const retryLoad = document.getElementById('retryLoad');
  const refreshStatus = document.getElementById('refreshStatus');
  const bookingTooltip = document.getElementById('bookingTooltip');

  let BUSY = false;
  let editing = null; // {id, calendarId, ...}
  let activeRoom = 'TC1';
  let modalRoom = 'TC1';
  let rangeLoadSeq = 0;
  const AUTO_REFRESH_MS = 30 * 1000;

  // Super-snappy UX helpers
  function syncRoomBadge(room){
    modalRoom = room;
    roomEl.value = room;
    roomEl.className = 'room-select ' + room.toLowerCase(); // tc1/tc2/tc3 class for colors
    updateAvailabilityPreview();
  }
  roomEl.addEventListener('change', ()=>syncRoomBadge(roomEl.value));
  function showSpin(v){ spinner.style.display = v ? 'block' : 'none'; }
  function toast(msg, type='ok', ms=1700){
    toastEl.className = ''; toastEl.classList.add(type);
    toastEl.textContent = msg; toastEl.style.display='flex';
    clearTimeout(toastEl._t); toastEl._t = setTimeout(()=>toastEl.style.display='none', ms);
  }
  function setLoadError(visible){
    loadError.classList.toggle('hidden', !visible);
  }
  function setRefreshStatus(text){
    refreshStatus.textContent = text;
  }
  function showBookingTooltip(text, x, y){
    bookingTooltip.textContent = text;
    bookingTooltip.classList.remove('hidden');
    const offset = 12;
    const rect = bookingTooltip.getBoundingClientRect();
    const left = Math.min(x + offset, window.innerWidth - rect.width - offset);
    const top = Math.min(y + offset, window.innerHeight - rect.height - offset);
    bookingTooltip.style.left = `${Math.max(offset, left)}px`;
    bookingTooltip.style.top = `${Math.max(offset, top)}px`;
  }
  function hideBookingTooltip(){
    bookingTooltip.classList.add('hidden');
  }
  function escapeHtml(value){
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));
  }
  function tuiTimeParts(time){
    return {
      hour: Number(time?.hour ?? 0),
      minutes: Number(time?.minutes ?? time?.minute ?? 0)
    };
  }
  function formatTuiClock(time, showMinutes){
    const { hour, minutes } = tuiTimeParts(time);
    const date = new Date(2000, 0, 1, hour, minutes, 0, 0);
    const text = date.toLocaleTimeString(undefined, {
      hour:'numeric',
      minute: showMinutes || minutes ? '2-digit' : undefined,
      hour12:true
    });
    return text.replace(/\s?AM$/i, ' AM').replace(/\s?PM$/i, ' PM');
  }
  function formatTuiPrimaryTime(time){
    return formatTuiClock(time, false);
  }
  function formatTuiGridTime(time){
    return formatTuiClock(time, true);
  }
  function uuid(){ return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16)}) }
  function setTabsLocked(locked){
    document.getElementById('roomTabs').classList.toggle('locked', locked);
    document.querySelectorAll('#roomTabs .tab').forEach(tab => {
      tab.setAttribute('aria-disabled', locked ? 'true' : 'false');
    });
  }
  function openModal(title, preset){
    modalTitle.textContent = title;
    modalBg.style.display = 'flex';
    setTabsLocked(true);

    nameEl.value  = preset?.name || '';
    dateEl.value  = preset?.date || '';
    startEl.value = preset?.start || '';
    endEl.value   = preset?.end || '';

    const room = preset?.room || activeRoom || 'TC1';
    syncRoomBadge(room);

    hoodEl.value  = preset?.hood || '1';
    repeatWeeksEl.value = preset?.repeatWeeks || '1';
    createOptions.classList.toggle('hidden', preset?.mode === 'edit');
    deleteBtn.classList.toggle('hidden', preset?.mode !== 'edit');
    extendBtn.classList.toggle('hidden', preset?.mode !== 'edit');
    exportBtn.classList.toggle('hidden', preset?.mode !== 'edit');
    updateAvailabilityPreview();
    setTimeout(()=>nameEl.focus(), 0);
  }
  function closeModal(){
    modalBg.style.display = 'none';
    setTabsLocked(false);
  }
  modalBg.addEventListener('click', ev => {
    if (ev.target === modalBg && !BUSY) {
      editing = null;
      closeModal();
    }
  });
  document.addEventListener('keydown', ev => {
    if (ev.key === 'Escape' && modalBg.style.display === 'flex' && !BUSY) {
      editing = null;
      closeModal();
    }
  });
  [nameEl, dateEl, startEl, endEl, hoodEl, repeatWeeksEl].forEach(el => {
    el.addEventListener('input', updateAvailabilityPreview);
    el.addEventListener('change', updateAvailabilityPreview);
  });
  document.getElementById('calendar').addEventListener('mousemove', ev => {
    const eventEl = ev.target.closest('.booking-event');
    if (!eventEl) {
      hideBookingTooltip();
      return;
    }
    showBookingTooltip(eventEl.dataset.tooltip || '', ev.clientX, ev.clientY);
  });
  document.getElementById('calendar').addEventListener('mouseleave', hideBookingTooltip);
  const guideLabelObserver = new MutationObserver(normalizeGuideTimeLabels);
  guideLabelObserver.observe(document.getElementById('calendar'), {
    childList:true,
    subtree:true,
    characterData:true
  });

  function toLocalDateInputValue(d){ const t = new Date(d); t.setMinutes(t.getMinutes()-t.getTimezoneOffset()); return t.toISOString().slice(0,10); }
  function toLocalTimeInputValue(d){ const t = new Date(d); t.setMinutes(t.getMinutes()-t.getTimezoneOffset()); return t.toISOString().slice(11,16); }
  function formatTimePart(d, includeMeridiem){
    const text = d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit', hour12:true });
    const compact = text.replace(':00', '');
    return includeMeridiem ? compact : compact.replace(/\s?[AP]M$/i, '');
  }
  function formatTimeRange(start, end){
    const startMeridiem = start.toLocaleTimeString(undefined, { hour12:true }).match(/[AP]M/i)?.[0];
    const endMeridiem = end.toLocaleTimeString(undefined, { hour12:true }).match(/[AP]M/i)?.[0];
    const sameMeridiem = startMeridiem && endMeridiem && startMeridiem.toUpperCase() === endMeridiem.toUpperCase();
    return `${formatTimePart(start, !sameMeridiem)}-${formatTimePart(end, true)}`;
  }
  function formatHourMinute(hour, minutes){
    const date = new Date(2000, 0, 1, Number(hour), Number(minutes), 0, 0);
    return date.toLocaleTimeString(undefined, {
      hour:'numeric',
      minute:Number(minutes) ? '2-digit' : undefined,
      hour12:true
    }).replace(/\s?AM$/i, ' AM').replace(/\s?PM$/i, ' PM');
  }
  function replaceMilitaryTimeRanges(text){
    return String(text).replace(/\b([01]?\d|2[0-3]):([0-5]\d)\s*-\s*([01]?\d|2[0-3]):([0-5]\d)\b/g, (match, h1, m1, h2, m2) => {
      return `${formatHourMinute(h1, m1)} - ${formatHourMinute(h2, m2)}`;
    });
  }
  function normalizeGuideTimeLabels(){
    const root = document.getElementById('calendar');
    if (!root) return;
    const guides = root.querySelectorAll([
      '.tui-full-calendar-timegrid-guide',
      '.tui-full-calendar-timegrid-guide-creation',
      '.tui-full-calendar-time-guide-creation'
    ].join(','));
    guides.forEach(guide => {
      const walker = document.createTreeWalker(guide, NodeFilter.SHOW_TEXT);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(node => {
        const next = replaceMilitaryTimeRanges(node.nodeValue);
        if (next !== node.nodeValue) node.nodeValue = next;
      });
    });
  }
  function formatIcsDate(date){
    return new Date(date).toISOString().replace(/[-:]/g, '').replace(/\.\d{3}Z$/, 'Z');
  }
  function escapeIcsText(value){
    return String(value ?? '').replace(/\\/g, '\\\\').replace(/\n/g, '\\n').replace(/,/g, '\\,').replace(/;/g, '\\;');
  }
  function downloadIcs(events, filename = 'hood-booking.ics'){
    if (!events.length) return;
    const lines = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Riley Lab//TC Hood Booking//EN',
      'CALSCALE:GREGORIAN'
    ];
    events.forEach(event => {
      lines.push(
        'BEGIN:VEVENT',
        `UID:${escapeIcsText(event.id)}@rileylab.github.io`,
        `DTSTAMP:${formatIcsDate(new Date())}`,
        `DTSTART:${formatIcsDate(event.start)}`,
        `DTEND:${formatIcsDate(event.end)}`,
        `SUMMARY:${escapeIcsText(event.title || 'TC Hood Booking')}`,
        `LOCATION:${escapeIcsText((event.calendarId || '').replace('-', '/Hood '))}`,
        'END:VEVENT'
      );
    });
    lines.push('END:VCALENDAR');
    const blob = new Blob([lines.join('\r\n')], { type:'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(url);
  }
  function googleCalendarUrl(event){
    const title = event.title || 'TC Hood Booking';
    const location = (event.calendarId || '').replace('-', '/Hood ');
    const details = `Riley Lab TC Hood Booking\n${location}`;
    const params = new URLSearchParams({
      action:'TEMPLATE',
      text:title,
      dates:`${formatIcsDate(event.start)}/${formatIcsDate(event.end)}`,
      location,
      details
    });
    return `https://calendar.google.com/calendar/render?${params.toString()}`;
  }
  function openGoogleCalendar(event){
    window.open(googleCalendarUrl(event), '_blank', 'noopener');
  }
  function showCalendarPrompt(event){
    calendarPrompt._event = event;
    calendarPrompt.classList.remove('hidden');
    clearTimeout(calendarPrompt._t);
    calendarPrompt._t = setTimeout(()=>calendarPrompt.classList.add('hidden'), 15000);
  }
  function buildDate(dateStr, timeStr){ const [y,m,d]=dateStr.split('-').map(Number); const [hh,mm]=timeStr.split(':').map(Number); return new Date(y,m-1,d,hh,mm,0,0); }
  function titleFor(name, room, hood){ return `${name || 'Booking'} — ${room}/Hood ${hood}`; }
  function hasLocalOverlap(id, calendarId, start, end){
    return cache.events.some(event => {
      if (event.id === id || event.calendarId !== calendarId) return false;
      return new Date(event.start) < end && start < new Date(event.end);
    });
  }
  function modalDateRange(){
    if (!dateEl.value || !startEl.value || !endEl.value) return null;
    const start = buildDate(dateEl.value, startEl.value);
    const end = buildDate(dateEl.value, endEl.value);
    return end > start ? { start, end } : null;
  }
  function findAlternatives(room, durationMs, dateStr, limit = 4){
    if (!dateStr || !durationMs) return [];
    const day = buildDate(dateStr, '06:00');
    const today = toLocalDateInputValue(new Date());
    if (dateStr === today) {
      const now = new Date();
      now.setMinutes(Math.ceil(now.getMinutes()/15)*15,0,0);
      if (now > day) day.setTime(now.getTime());
    }
    const latestStart = buildDate(dateStr, '23:45');
    const results = [];
    for (let cursor = new Date(day); cursor <= latestStart && results.length < limit; cursor = new Date(cursor.getTime() + 15*60*1000)) {
      const start = new Date(cursor);
      const end = new Date(start.getTime() + durationMs);
      if (end.getDate() !== start.getDate()) continue;
      for (const hood of ['1','2','3']) {
        const calendarId = `${room}-${hood}`;
        if (!hasLocalOverlap(editing?.id || null, calendarId, start, end)) {
          results.push({ room, hood, start, end });
          break;
        }
      }
    }
    return results;
  }
  function updateAvailabilityPreview(){
    if (!availabilityBox || modalBg.style.display !== 'flex') return;
    suggestionsEl.innerHTML = '';
    availabilityBox.className = 'availability-box';
    availabilityBox.textContent = '';
    const range = modalDateRange();
    if (!range) {
      availabilityBox.classList.add('warn');
      availabilityBox.textContent = 'Pick a valid start and end time to check availability.';
      return;
    }
    const room = modalRoom || roomEl.value;
    const hood = hoodEl.value;
    const hasConflict = hasLocalOverlap(editing?.id || null, `${room}-${hood}`, range.start, range.end);
    if (!hasConflict) {
      availabilityBox.classList.add('ok');
      availabilityBox.textContent = `Available for ${room}/Hood ${hood}.`;
      return;
    }
    availabilityBox.classList.add('warn');
    availabilityBox.textContent = `Conflict on Hood ${hood}. Try one of these openings:`;
    const durationMs = range.end - range.start;
    findAlternatives(room, durationMs, dateEl.value).forEach(option => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'suggestion-btn';
      btn.textContent = `Hood ${option.hood}, ${formatTimeRange(option.start, option.end)}`;
      btn.addEventListener('click', () => {
        hoodEl.value = option.hood;
        startEl.value = toLocalTimeInputValue(option.start);
        endEl.value = toLocalTimeInputValue(option.end);
        updateAvailabilityPreview();
      });
      suggestionsEl.appendChild(btn);
    });
  }

  /* ---------- FAST data layer (range cache) ---------- */
  const cache = { key: null, events: [] }; // events = [{id, calendarId, title, start, end}]
  const rangeStore = new Map();
  const prefetchingRanges = new Set();
  function cloneEvents(events){ return events.map(e => ({ ...e })); }
  function keyForRange(start, end){ return `${start.toISOString()}|${end.toISOString()}`; }
  function currentRange(){
    const start = calendar.getDateRangeStart().toDate();
    const end = calendar.getDateRangeEnd().toDate();
    return { start, end, key: keyForRange(start, end) };
  }
  function eventIntersectsCurrentRange(event){
    const { start, end } = currentRange();
    return new Date(event.start) < end && start < new Date(event.end);
  }
  function rangeKey(){ return currentRange().key; }
  function normalizeEvents(data){
    return data.map(x=>({ id:x.id, calendarId:x.calendarId, title:x.title, start:x.start, end:x.end }));
  }
  function rememberCurrentCache(){
    if (cache.key) rangeStore.set(cache.key, cloneEvents(cache.events));
  }

  async function fetchRangeFor(start, end){
    const s = start.toISOString();
    const e = end.toISOString();
    const res = await fetch(`${ENDPOINT}?start=${encodeURIComponent(s)}&end=${encodeURIComponent(e)}&timeMin=${encodeURIComponent(s)}&timeMax=${encodeURIComponent(e)}`);
    const json = await res.json();
    return Array.isArray(json) ? json : [];
  }
  function formatRefreshTime(date = new Date()){
    return date.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
  }

  async function ensureRangeLoaded({ force = false, quiet = false } = {}){
    const { start, end, key:k } = currentRange();
    if (!force && rangeStore.has(k)) {
      cache.key = k;
      cache.events = cloneEvents(rangeStore.get(k));
      setLoadError(false);
      setRefreshStatus(`Loaded instantly from cache`);
      prefetchAdjacentRanges();
      return;
    }
    if (!force && cache.key === k && cache.events.length) return; // already loaded
    const seq = ++rangeLoadSeq;
    if (!quiet) showSpin(true);
    try {
      const data = await fetchRangeFor(start, end);
      if (seq !== rangeLoadSeq || k !== rangeKey()) return;
      setLoadError(false);
      setRefreshStatus(`Updated ${formatRefreshTime()}`);
      cache.key = k;
      cache.events = normalizeEvents(data);
      rememberCurrentCache();
      // render all once
      Cal.clear();
      // avoid layout thrash: hide, add, show
      document.getElementById('calendar').style.visibility = 'hidden';
      Cal.add(cache.events.map(x=>({ id:x.id, calendarId:x.calendarId, title:x.title, category:'time', start:new Date(x.start), end:new Date(x.end), isReadOnly:false })));
      document.getElementById('calendar').style.visibility = '';
    } catch (err) {
      setLoadError(true);
      setRefreshStatus('Refresh failed');
      if (!quiet) toast('Could not load bookings.', 'err', 2600);
      throw err;
    } finally {
      if (seq === rangeLoadSeq && !quiet) showSpin(false);
    }
  }

  function prefetchAdjacentRanges(){
    const { start, end } = currentRange();
    const span = end.getTime() - start.getTime();
    if (!span) return;
    [-1, 1].forEach(direction => {
      const nextStart = new Date(start.getTime() + direction * span);
      const nextEnd = new Date(end.getTime() + direction * span);
      const k = keyForRange(nextStart, nextEnd);
      if (rangeStore.has(k) || prefetchingRanges.has(k)) return;
      prefetchingRanges.add(k);
      fetchRangeFor(nextStart, nextEnd)
        .then(data => rangeStore.set(k, normalizeEvents(data)))
        .catch(()=>{})
        .finally(()=>prefetchingRanges.delete(k));
    });
  }

  function renderRoom(room){
    activeRoom = room;

    // Re-render from cache: only events for the selected room
    const toRender = cache.events.filter(e => String(e.calendarId).startsWith(`${room}-`));

    // Fast redraw without thrash
    Cal.clear();
    document.getElementById('calendar').style.visibility = 'hidden';
    Cal.add(toRender.map(x => ({
      id: x.id,
      calendarId: x.calendarId,
      title: x.title,
      category: 'time',
      start: new Date(x.start),
      end: new Date(x.end),
      isReadOnly: false
    })));
    document.getElementById('calendar').style.visibility = '';
    renderAvailableSlots();
  }

  function slotsForDay(room, dateStr, durationMinutes){
    if (!dateStr) return [];
    const durationMs = Number(durationMinutes || 60) * 60 * 1000;
    const dayStart = buildDate(dateStr, '06:00');
    const today = toLocalDateInputValue(new Date());
    if (dateStr === today) {
      const now = new Date();
      now.setMinutes(Math.ceil(now.getMinutes()/30)*30,0,0);
      if (now > dayStart) dayStart.setTime(now.getTime());
    }
    const dayEnd = buildDate(dateStr, '23:59');
    const slots = [];
    for (let start = new Date(dayStart); start.getTime() + durationMs <= dayEnd.getTime() && slots.length < 18; start = new Date(start.getTime() + 30*60*1000)) {
      const end = new Date(start.getTime() + durationMs);
      ['1','2','3'].forEach(hood => {
        const calendarId = `${room}-${hood}`;
        if (!hasLocalOverlap(null, calendarId, start, end)) {
          slots.push({ room, hood, start:new Date(start), end });
        }
      });
    }
    return slots;
  }
  function renderAvailableSlots(){
    if (slotFinder?.classList.contains('collapsed')) return;
    if (!slotResults || !slotDateEl.value) return;
    const slots = slotsForDay(activeRoom, slotDateEl.value, slotDurationEl.value);
    slotResults.innerHTML = '';
    if (!slots.length) {
      slotResults.innerHTML = '<div class="slot-empty">No open slots found for this room and duration.</div>';
      return;
    }
    slots.slice(0, 12).forEach(slot => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'slot-chip';
      btn.innerHTML = `${formatTimeRange(slot.start, slot.end)}<span>${slot.room}/Hood ${slot.hood}</span>`;
      btn.addEventListener('click', () => {
        openModal('New Booking', {
          mode:'create',
          name:'',
          date: toLocalDateInputValue(slot.start),
          start: toLocalTimeInputValue(slot.start),
          end: toLocalTimeInputValue(slot.end),
          room: slot.room,
          hood: slot.hood
        });
        editing = { id:null };
      });
      slotResults.appendChild(btn);
    });
  }

  /* ---------- API helper ---------- */
  async function postSimple(payload){
    try {
      const res = await fetch(ENDPOINT, {
        method:'POST',
        headers:{ 'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8' },
        body: new URLSearchParams({ payload: JSON.stringify(payload), action: payload.action }).toString()
      });
      try { return await res.json(); } catch { return {}; }
    } catch (err) {
      return { ok:false, error:'network' };
    }
  }
  function eventFromModal(id, room, hood, start, end, name){
    return {
      id,
      calendarId: `${room}-${hood}`,
      title: titleFor(name, room, hood),
      start: start.toISOString(),
      end: end.toISOString()
    };
  }
  function addDays(date, days){
    const next = new Date(date);
    next.setDate(next.getDate() + days);
    return next;
  }
  function generatedCreateEvents(){
    const name = nameEl.value.trim();
    const room = modalRoom;
    const range = modalDateRange();
    if (!range) return [];
    const repeatWeeks = Math.max(1, Number(repeatWeeksEl.value || 1));
    const hood = hoodEl.value;
    const events = [];
    for (let week = 0; week < repeatWeeks; week++) {
      const start = addDays(range.start, week * 7);
      const end = addDays(range.end, week * 7);
      events.push(eventFromModal(uuid(), room, hood, start, end, name));
    }
    return events;
  }
  function renderEventObject(event){
    return {
      id: event.id,
      calendarId: event.calendarId,
      title: event.title,
      category:'time',
      start:new Date(event.start),
      end:new Date(event.end),
      isReadOnly:false
    };
  }
  async function persistCreatedEvents(events){
    const saved = [];
    for (const event of events) {
      const resp = await postSimple({ action:'create', event });
      if (!resp || resp.ok !== true) {
        return { ok:false, error: resp?.error || 'network', saved };
      }
      saved.push(event);
    }
    return { ok:true, saved };
  }

  /* ---------- Toolbar + navigation (prefetch pattern) ---------- */
  function reloadRange(){
    setRangeTitle();
    const k = rangeKey();
    if (rangeStore.has(k)) {
      cache.key = k;
      cache.events = cloneEvents(rangeStore.get(k));
      renderRoom(activeRoom);
      setRefreshStatus('Loaded instantly from cache');
      ensureRangeLoaded({ force:true, quiet:true })
        .then(()=>{ renderRoom(activeRoom); prefetchAdjacentRanges(); })
        .catch(()=>{});
      return;
    }
    ensureRangeLoaded()
      .then(()=>{ renderRoom(activeRoom); prefetchAdjacentRanges(); })
      .catch(()=>{});
  }
  async function autoRefreshRange(){
    if (BUSY || modalBg.style.display === 'flex') {
      setRefreshStatus('Live refresh paused while editing');
      return;
    }
    const room = activeRoom;
    try {
      await ensureRangeLoaded({ force:true, quiet:true });
      renderRoom(room);
      prefetchAdjacentRanges();
    } catch (err) {
      // The inline retry banner is enough for background refresh failures.
    }
  }
  document.getElementById('prev').onclick  = ()=>{ calendar.prev();  reloadRange(); };
  document.getElementById('today').onclick = ()=>{ calendar.today(); reloadRange(); };
  document.getElementById('next').onclick  = ()=>{ calendar.next();  reloadRange(); };
  document.getElementById('week').onclick  = ()=>{ calendar.changeView('week',true); reloadRange(); };
  document.getElementById('day').onclick   = ()=>{ calendar.changeView('day', true); reloadRange(); };
  refreshSlotsBtn.onclick = renderAvailableSlots;
  slotDateEl.addEventListener('change', renderAvailableSlots);
  slotDurationEl.addEventListener('change', renderAvailableSlots);
  slotFinderToggle.onclick = ()=>{
    const collapsed = slotFinder.classList.toggle('collapsed');
    slotFinderToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
    if (!collapsed) renderAvailableSlots();
  };
  googleCalendarBtn.onclick = ()=>{
    if (!calendarPrompt._event) return;
    openGoogleCalendar(calendarPrompt._event);
    calendarPrompt.classList.add('hidden');
  };
  icsCalendarBtn.onclick = ()=>{
    if (!calendarPrompt._event) return;
    downloadIcs([calendarPrompt._event], 'hood-booking.ics');
    calendarPrompt.classList.add('hidden');
  };
  dismissCalendarPrompt.onclick = ()=>calendarPrompt.classList.add('hidden');
  retryLoad.onclick = reloadRange;

  /* ---------- Tabs ---------- */
  document.querySelectorAll('#roomTabs .tab').forEach(tab=>{
    const activate = ()=>{
      if (modalBg.style.display === 'flex') return;
      document.querySelectorAll('#roomTabs .tab').forEach(t=>{
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      renderRoom(tab.dataset.room);
      toast(`Viewing ${tab.dataset.room}`, 'ok', 800);
    };
    tab.addEventListener('click', activate);
    tab.addEventListener('keydown', ev => {
      if (ev.key === 'Enter' || ev.key === ' ') {
        ev.preventDefault();
        activate();
      }
    });
  });

  /* ---------- Create ---------- */
  calendar.on('beforeCreateSchedule', ev=>{
    openModal('New Booking', {
      mode:'create',
      name:'',
      date: toLocalDateInputValue(ev.start.toDate()),
      start: toLocalTimeInputValue(ev.start.toDate()),
      end: toLocalTimeInputValue(ev.end.toDate()),
      room: activeRoom, hood:'1'
    });
    editing = { id:null };
  });

  newBtn.onclick = ()=>{
    const now = new Date(); const floor = new Date(now);
    floor.setMinutes(Math.ceil(floor.getMinutes()/30)*30,0,0);
    openModal('New Booking', {
      mode:'create',
      name:'',
      date: toLocalDateInputValue(floor),
      start: toLocalTimeInputValue(floor),
      end: toLocalTimeInputValue(new Date(floor.getTime()+60*60*1000)),
      room: activeRoom, hood:'1'
    });
    editing = { id:null };
  };

  /* ---------- Click to Edit ---------- */
  calendar.on('clickSchedule', ({ schedule })=>{
    const start = schedule.start.toDate(), end = schedule.end.toDate();
    const [room,hood] = schedule.calendarId.split('-');
    const nameGuess = schedule.title?.split(' — ')[0] || '';
    openModal('Edit Booking', {
      mode:'edit',
      name: nameGuess,
      date: toLocalDateInputValue(start),
      start: toLocalTimeInputValue(start),
      end: toLocalTimeInputValue(end),
      room, hood
    });
    editing = { id:schedule.id, calendarId:schedule.calendarId };
  });

  /* ---------- Drag/Resize Edit (server-checked, optimistic) ---------- */
  calendar.on('beforeUpdateSchedule', async (ev)=>{
    if (BUSY) {
      toast('Finish the current save first.', 'warn', 1400);
      return;
    }
    const { schedule, changes } = ev;
    const newStart = (changes.start ? changes.start.toDate() : schedule.start.toDate());
    const newEnd   = (changes.end   ? changes.end.toDate()   : schedule.end.toDate());
    const newCalId = changes.calendarId || schedule.calendarId;
    const title = changes.title || schedule.title;

    if (newEnd <= newStart) {
      toast('End time must be after start time.', 'warn');
      return;
    }
    if (hasLocalOverlap(schedule.id, newCalId, newStart, newEnd)) {
      toast('Conflict: that hood already has a booking.', 'warn', 2200);
      renderRoom(activeRoom);
      return;
    }

    BUSY = true;
    showSpin(true);
    setRefreshStatus('Saving time change...');

    const prev = {
      id: schedule.id,
      calendarId: schedule.calendarId,
      title: schedule.title,
      start: schedule.start.toDate().toISOString(),
      end: schedule.end.toDate().toISOString()
    };
    const next = {
      id: schedule.id,
      calendarId: newCalId,
      title,
      start: newStart.toISOString(),
      end: newEnd.toISOString()
    };

    try {
      // Optimistic update, using plain Date values so TUI gets a normalized payload.
      Cal.update(schedule.id, schedule.calendarId, {
        calendarId: newCalId,
        title,
        start: new Date(newStart),
        end: new Date(newEnd)
      });
      const idx = cache.events.findIndex(e=>e.id===schedule.id);
      if (idx>=0) cache.events[idx] = next;
      else cache.events.push(next);
      rememberCurrentCache();
      renderRoom(activeRoom);
      toast(`Updating to ${formatTimeRange(newStart, newEnd)}...`, 'ok', 1200);

      const resp = await postSimple({ action:'update', event:{ ...next, previous: prev }});
      if (!resp || resp.ok !== true){
        const rollbackIdx = cache.events.findIndex(e=>e.id===schedule.id);
        if (rollbackIdx>=0) cache.events[rollbackIdx] = prev;
        else cache.events.push(prev);
        rememberCurrentCache();
        renderRoom(activeRoom);
        toast(resp && resp.error === 'conflict' ? 'Conflict: that hood already has a booking.' : 'Update failed. Reverted.', resp && resp.error === 'conflict' ? 'warn' : 'err', 2200);
        await ensureRangeLoaded({ force:true }).catch(()=>{});
        renderRoom(activeRoom);
      } else {
        setRefreshStatus(`Updated ${formatRefreshTime()}`);
        toast('Updated.', 'ok', 900);
      }
    } finally {
      showSpin(false);
      BUSY = false;
    }
  });

  extendBtn.onclick = async ()=>{
    if (!editing?.id || BUSY) return;
    const range = modalDateRange();
    if (!range) return;
    const end = new Date(range.end.getTime() + 30*60*1000);
    endEl.value = toLocalTimeInputValue(end);
    updateAvailabilityPreview();
    toast('Extended by 30 minutes. Save to confirm.', 'ok', 1200);
  };

  exportBtn.onclick = ()=>{
    if (!editing?.id) return;
    const range = modalDateRange();
    if (!range) return;
    openGoogleCalendar({
      id: editing.id,
      calendarId: `${modalRoom}-${hoodEl.value}`,
      title: titleFor(nameEl.value.trim(), modalRoom, hoodEl.value),
      start: range.start,
      end: range.end
    });
  };

  /* ---------- Modal actions ---------- */
  cancelBtn.onclick = ()=>{ editing=null; closeModal(); };

  deleteBtn.onclick = async ()=>{
    if (!editing?.id || BUSY) return;
    BUSY = true;

    // Optimistic: close modal and remove immediately
    const id = editing.id;
    const calendarId = editing.calendarId;
    const previousEvent = cache.events.find(e => e.id === id);
    closeModal();
    Cal.remove(id, calendarId);
    cache.events = cache.events.filter(e => e.id !== id);
    rememberCurrentCache();
    renderRoom(activeRoom);

    // Persist
    const res = await postSimple({ action:'delete', event:{ id } });
    if (res && res.ok){
      toast('Deleted.', 'ok', 900);
    } else {
      toast('Delete failed. Reloading…', 'err', 1600);
      if (previousEvent && !cache.events.some(e => e.id === id)) {
        cache.events.push(previousEvent);
        rememberCurrentCache();
        renderRoom(activeRoom);
      }
      // Recover by reloading the range and re-rendering the active room
      await ensureRangeLoaded({ force:true }).catch(()=>{});
      renderRoom(activeRoom);
    }
    BUSY = false; editing = null;
  };

  saveBtn.onclick = async ()=>{
    if (BUSY) return;
    const name = nameEl.value.trim();
    const room = modalRoom;
    const hood = hoodEl.value;
    const calendarId = `${room}-${hood}`;
    const date = dateEl.value;
    const sTime = startEl.value;
    const eTime = endEl.value;

    if (!name){ toast('Please enter your name.', 'warn'); return; }
    if (!date || !sTime || !eTime){ toast('Pick a date and start/end times.', 'warn'); return; }

    const start = buildDate(date, sTime);
    const end   = buildDate(date, eTime);
    const now   = new Date();
    const title = titleFor(name, room, hood);
    if (end <= start){ toast('End time must be after start time.', 'warn'); return; }
    if (end - start < 15*60*1000){ toast('Minimum booking is 15 minutes.', 'warn'); return; }
    if (hasLocalOverlap(editing?.id || null, calendarId, start, end)){
      toast('Possible overlap. Server will confirm availability.', 'warn', 2200);
    }
    if (end <= now){ if(!confirm('This is in the past. Save anyway?')) return; }

    BUSY = true;

    // ---- EDIT EXISTING ----
    if (editing && editing.id){
      const id = editing.id;
      const oldCalendarId = editing.calendarId;

      // Optimistic: close modal, update UI & cache first
      closeModal();
      Cal.update(id, oldCalendarId, { title, start, end, calendarId });
      const ci = cache.events.findIndex(e => e.id === id);
      if (ci >= 0) cache.events[ci] = { id, calendarId, title, start: start.toISOString(), end: end.toISOString() };
      rememberCurrentCache();
      renderRoom(activeRoom);

      // Persist
      const resp = await postSimple({ action:'update', event:{ id, calendarId, title, start: start.toISOString(), end: end.toISOString() }});
      if (resp && resp.ok){
        toast('Saved.', 'ok', 900);
      } else {
        // Rollback on failure
        toast(resp && resp.error==='conflict' ? '⚠️ Conflict: that hood already has a booking.' : 'Update failed. Rolling back.', resp && resp.error==='conflict' ? 'warn' : 'err', 2000);
        await ensureRangeLoaded({ force:true }).catch(()=>{});
        renderRoom(activeRoom);
      }
      BUSY = false; editing = null; return;
    }

    // ---- CREATE NEW / RECURRING ----
    const events = generatedCreateEvents();
    if (!events.length) {
      toast('Could not build that booking.', 'err');
      BUSY = false;
      return;
    }
    const conflicting = events.filter(event => hasLocalOverlap(null, event.calendarId, new Date(event.start), new Date(event.end)));
    if (conflicting.length) {
      const proceed = confirm(`${conflicting.length} generated booking(s) may conflict. Try to save anyway?`);
      if (!proceed) {
        BUSY = false;
        return;
      }
    }

    // Optimistic: close modal, add to UI & cache first
    closeModal();
    const visibleEvents = events.filter(eventIntersectsCurrentRange);
    Cal.add(visibleEvents.map(renderEventObject));
    cache.events.push(...visibleEvents);
    rememberCurrentCache();
    renderRoom(activeRoom);

    // Persist
    const result = await persistCreatedEvents(events);
    if (result.ok){
      toast(events.length === 1 ? 'Saved.' : `Saved ${events.length} bookings.`, 'ok', 1200);
      if (events.length === 1) {
        showCalendarPrompt({ ...events[0], start:new Date(events[0].start), end:new Date(events[0].end) });
      } else {
        calendarPrompt._event = null;
        calendarPrompt.classList.add('hidden');
        downloadIcs(events.map(event => ({ ...event, start:new Date(event.start), end:new Date(event.end) })), 'hood-bookings.ics');
      }
    } else {
      // Rollback generated bookings on failure
      toast(result.error==='conflict' ? 'Conflict while saving. Rolling back.' : 'Create failed. Rolling back.', result.error==='conflict' ? 'warn' : 'err', 2200);
      await Promise.all((result.saved || []).map(event => postSimple({ action:'delete', event:{ id:event.id } }).catch(()=>null)));
      const ids = new Set(events.map(event => event.id));
      events.forEach(event => Cal.remove(event.id, event.calendarId));
      cache.events = cache.events.filter(event => !ids.has(event.id));
      rememberCurrentCache();
      await ensureRangeLoaded({ force:true }).catch(()=>{});
      renderRoom(activeRoom);
    }
    BUSY = false; editing = null;
  };

  /* ---------- Init ---------- */
  slotDateEl.value = toLocalDateInputValue(new Date());
  setRangeTitle();
  (async ()=>{
    await ensureRangeLoaded().catch(()=>{});
    ['TC1','TC2','TC3'].forEach(r => { /* warm: render & clear */
      const old = activeRoom; renderRoom(r); Cal.clear(); activeRoom = old;
    });
    renderRoom(activeRoom);
    prefetchAdjacentRanges();
  })();
  setInterval(autoRefreshRange, AUTO_REFRESH_MS);

</script>
</body>
</html>

backend:
  name: github
  repo: RileyLab/RileyLab.github.io
  branch: master
  site_domain: rileylab.github.io
  base_url: https://riley-decap-oauth.rileylabupenn.workers.dev
  auth_endpoint: auth

publish_mode: editorial_workflow

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "data"
    label: "Site Data"
    files:
      - name: "portal"
        label: "Lab Portal"
        file: "data/lab-portal.json"
        fields:
          - label: "Announcements"
            name: "announcements"
            widget: list
            fields:
              - { label: "Text", name: "text", widget: text, required: false }
              - { label: "HTML", name: "html", widget: text, required: false, hint: "Optional raw HTML. Use this when you need full announcement formatting." }
              - { label: "Level", name: "level", widget: select, required: false, options: ["info", "warn", "urgent"], default: "info" }
              - { label: "Link", name: "link", widget: string, required: false }
              - { label: "When (ISO)", name: "when", widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ" }
          - label: "Lab Meetings"
            name: "labMeetings"
            widget: list
            fields:
              - { label: "Meeting Date", name: "date", widget: date, format: "YYYY-MM-DD" }
              - { label: "Presenter", name: "presenter", widget: string }
              - { label: "Meeting Title", name: "title", widget: string }
              - { label: "Meeting Description", name: "description", widget: text, required: false }
              - { label: "Presenter Photo", name: "image", widget: image, required: false }
          - { label: "Google Calendar API Key", name: "googleCalendarApiKey", widget: string, required: false }
          - label: "Rotations"
            name: "rotations"
            widget: object
            required: false
            fields:
              - { label: "Start", name: "start", widget: date, format: "YYYY-MM-DD", required: false }
              - { label: "End",   name: "end",   widget: date, format: "YYYY-MM-DD", required: false }
              - { label: "TC1",   name: "tc1",   widget: string, required: false }
              - { label: "TC2",   name: "tc2",   widget: string, required: false }
              - { label: "TC3",   name: "tc3",   widget: string, required: false }
              - { label: "Main Lab", name: "main", widget: string, required: false }
          - label: "Rotation Plan"
            name: "rotationPlan"
            widget: object
            required: false
            fields:
              - { label: "Start", name: "start", widget: date, format: "YYYY-MM-DD" }
              - { label: "Period Days", name: "periodDays", widget: number, value_type: int, min: 1 }
              - label: "Anchor"
                name: "anchor"
                widget: object
                fields:
                  - { label: "Anchor Date", name: "date", widget: date, format: "YYYY-MM-DD" }
                  - label: "Current Assignees"
                    name: "current"
                    widget: object
                    fields:
                      - { label: "TC1", name: "tc1", widget: string }
                      - { label: "TC2", name: "tc2", widget: string }
                      - { label: "TC3", name: "tc3", widget: string }
                      - { label: "Main Lab", name: "main", widget: string }
              - label: "Room Order"
                name: "slotOrder"
                widget: object
                fields:
                  - label: "TC1 Order"
                    name: "tc1"
                    widget: list
                    field: { label: "Name", name: "name", widget: string }
                    summary: "{{fields.name}}"
                  - label: "TC2 Order"
                    name: "tc2"
                    widget: list
                    field: { label: "Name", name: "name", widget: string }
                    summary: "{{fields.name}}"
                  - label: "TC3 Order"
                    name: "tc3"
                    widget: list
                    field: { label: "Name", name: "name", widget: string }
                    summary: "{{fields.name}}"
                  - label: "Main Lab Order"
                    name: "main"
                    widget: list
                    field: { label: "Name", name: "name", widget: string }
                    summary: "{{fields.name}}"
              - label: "People"
                name: "people"
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: "Name", name: "name", widget: string }
                  - { label: "Active", name: "active", widget: boolean, default: true }
